<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Tło: coral gradient (brand) z zaokrąglonymi rogami 22.5% jak Android adaptive icon -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97056"/>
      <stop offset="100%" stop-color="#B84A3A"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDF8F0"/>
      <stop offset="100%" stop-color="#FBF3E4"/>
    </linearGradient>
    <!-- Subtle blush na policzku -->
    <radialGradient id="blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5B5A8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F5B5A8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Zaokrąglony kwadrat (adaptive icon mask) -->
  <rect width="512" height="512" rx="115.2" ry="115.2" fill="url(#bg)"/>

  <!-- Miękki highlight w lewym górnym rogu (światło) -->
  <circle cx="150" cy="130" r="120" fill="#FFFFFF" opacity="0.08"/>

  <!-- Buzia dziecka: cream okrągła -->
  <circle cx="256" cy="268" r="155" fill="url(#face)"/>

  <!-- Delikatne policzki (blush) -->
  <ellipse cx="175" cy="300" rx="28" ry="18" fill="url(#blush)"/>
  <ellipse cx="337" cy="300" rx="28" ry="18" fill="url(#blush)"/>

  <!-- Zamknięte oczy (śpiąca buzia) — dwie krzywe jak ∪ odwrócone -->
  <!-- Lewe oko -->
  <path d="M 195 258
           Q 210 248 225 258"
        stroke="#1E2618"
        stroke-width="7"
        stroke-linecap="round"
        fill="none"/>
  <!-- Prawe oko -->
  <path d="M 287 258
           Q 302 248 317 258"
        stroke="#1E2618"
        stroke-width="7"
        stroke-linecap="round"
        fill="none"/>

  <!-- Lekki uśmiech (zadowolenie) — mała krzywa -->
  <path d="M 236 330
           Q 256 345 276 330"
        stroke="#1E2618"
        stroke-width="6"
        stroke-linecap="round"
        fill="none"/>

  <!-- ZZZ nad główką (sen) — subtle, małe -->
  <g opacity="0.85" fill="#FDF8F0">
    <!-- Małe Z -->
    <path d="M 355 140
             L 385 140
             L 360 168
             L 388 168"
          stroke="#FDF8F0"
          stroke-width="6"
          stroke-linejoin="round"
          stroke-linecap="round"
          fill="none"/>
    <!-- Średnie Z -->
    <path d="M 395 95
             L 432 95
             L 398 133
             L 435 133"
          stroke="#FDF8F0"
          stroke-width="7"
          stroke-linejoin="round"
          stroke-linecap="round"
          fill="none"/>
  </g>

  <!-- Mały czubek czapeczki / włoska na górze (opcjonalny akcent) -->
  <ellipse cx="256" cy="130" rx="55" ry="15" fill="#1E2618" opacity="0.06"/>
</svg>
