<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1D9E75" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Spokojny Rodzic" />
    <meta name="description" content="Aplikacja, która pomaga Ci wiedzieć co robić, gdy dziecko jest chore." />
    <title>Spokojny Rodzic</title>
    <link rel="manifest" href="/babylog/manifest.json" />
    <link rel="apple-touch-icon" href="/babylog/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/babylog/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/babylog/sw.js', { scope: '/babylog/' })
            .catch(e => console.warn('SW:', e))
        })
      }
    </script>
  </body>
</html>
